# CI workflow for DevDeck
# Runs the repository CI verification contract.
# Source of truth for step definitions: .harness/contract.yml

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify non-browser gates
        timeout-minutes: 45
        run: |
          ./harness lint
          ./harness format_check
          ./harness build
          ./harness test
          ./harness smoke
