# Verification commands for the Soft Factory pipeline.
# The verifier agent loads these commands to validate work before committing.

steps:
  - name: lint
    command: npm run lint
    description: Run ESLint on the codebase

  - name: format_check
    command: npm run format:check
    description: Check code formatting with Prettier

  - name: build
    command: npm run build
    description: Build the Next.js application

  - name: test
    command: npm run test
    description: Run vitest test suite

  - name: smoke
    command: |
      npx next start --port 9999 &
      SERVER_PID=$!
      for i in 1 2 3 4 5 6 7 8; do
        sleep 2
        STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9999/ 2>/dev/null || echo "000")
        if [ "$STATUS" != "000" ]; then break; fi
      done
      kill $SERVER_PID 2>/dev/null
      wait $SERVER_PID 2>/dev/null
      if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "302" ]; then
        echo "Smoke test passed (HTTP $STATUS)"
        exit 0
      else
        echo "Smoke test failed (HTTP $STATUS)"
        exit 1
      fi
    description: Start the built app and verify it responds to HTTP
