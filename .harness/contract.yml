# Harness Contract — DevDeck
# Machine-readable command and evidence contract.
# Version: 1.0.0

harness:
  version: "1.0.0"
  entrypoint: "./harness"

verdicts:
  - name: pass
    exit_code: 0
    meaning: All required checks passed
  - name: fail
    exit_code: 1
    meaning: Backing command found a blocking problem
  - name: degraded
    exit_code: 2
    meaning: Optional dependency missing or partial operation
  - name: unknown
    exit_code: 3
    meaning: Cannot determine backing command or state

verbs:
  - name: help
    command: null
    description: Show available verbs and options
    json: false
    source: built-in

  - name: orient
    command: null
    description: Describe detected project surfaces and command mapping
    json: true
    source: built-in

  - name: doctor
    command: null
    description: Check local prerequisites and project health
    json: true
    source: inferred
    required_tools:
      - node
      - npm
      - git
    optional_tools:
      - just
      - tmux
      - curl

  - name: install
    command: "npm ci"
    description: Install dependencies exactly from package-lock.json without rewriting it
    json: true
    source: package-lock.json
    lockfile_required: true
    lockfile_mutation: false

  - name: lint
    command: "npm run lint"
    description: Run ESLint on the codebase
    json: true
    source: package.json

  - name: test
    command: "npm run test [-- <vitest args...>]"
    description: Run vitest test suite, optionally forwarding targeted Vitest args after --
    json: true
    source: package.json
    passthrough:
      delimiter: "--"
      no_args_command: "npm run test"
      targeted_command: "npm run test -- <vitest args...>"
      json_command:
        full_suite: "npm run test"
        targeted_summary: "npm run test -- <N target(s)>"
      harness_json_scope: "recognized before passthrough delimiter only"
      safety: "arguments forwarded through shell arrays; no eval"
      metadata:
        targeted: "false for full-suite runs; true when Vitest args are forwarded"
        targets: "array of sanitized string labels only; [] for full-suite runs"
        targetCount: "count of forwarded Vitest args; 0 for full-suite runs"
        truncated: "true when any sanitized label was capped; false otherwise"

  - name: e2e
    command: "npm run e2e [-- <playwright args...>]"
    description: Run Playwright browser E2E suite with harness-owned loopback ports and isolated fixtures
    json: true
    source: package.json
    passthrough:
      delimiter: "--"
      no_args_command: "npm run e2e"
      targeted_command: "npm run e2e -- <playwright args...>"
      json_command:
        full_suite: "npm run e2e"
        targeted_summary: "npm run e2e -- <N target(s)>"
      harness_json_scope: "recognized before passthrough delimiter only"
      safety: "arguments forwarded through shell arrays; no eval"
      metadata:
        targeted: "false for full-suite runs; true when Playwright args are forwarded"
        targets: "array of sanitized string labels only; [] for full-suite runs"
        targetCount: "count of forwarded Playwright args; 0 for full-suite runs"
        truncated: "true when any sanitized label was capped; false otherwise"
    runtime:
      bind_host: "127.0.0.1"
      web_port_range: "42000-42999"
      terminal_port_range: "43000-43999"
      max_candidates: 50
      fixed_port_conflict_verdict: degraded
      reuse_existing_server: false
      fixture_scratch: ".harness/run/e2e-<run-id>/"
      checked_in_fixtures: "e2e/fixtures/ are immutable seeds copied into scratch"
      cleanup: "release only harness-owned locks and scratch data on pass, fail, interrupt, timeout, or degraded"
    metadata_policy:
      shape: "metadata.e2e contains the canonical sanitized E2E object; selected fields may also appear at metadata top level for compatibility"
      test_counts:
        path: "metadata.e2e.testCounts"
        fields: [passed, failed, skipped, timedOut, interrupted]
      allowed:
        [
          e2e,
          targeted,
          targets,
          targetCount,
          truncated,
          playwrightProjects,
          testCounts,
          webPort,
          terminalPort,
          fixtureRunId,
          durationMs,
          artifactPaths,
        ]
      forbidden:
        [
          raw stdout/stderr,
          browser console logs,
          response bodies,
          screenshots/traces/videos inline,
          tokens,
          cookies,
          query strings,
          environment variables,
          credential URLs,
          external absolute paths,
        ]

  - name: build
    command: "npm run build"
    description: Build the Next.js application
    json: true
    source: package.json

  - name: boot
    command: "npx tsx src/server/start-dev.mts"
    description: Start the development server (Next.js + terminal server)
    json: true
    source: justfile dev recipe
    fallback: unknown if path missing

  - name: verify
    command: null
    description: Run lint → format:check → build → test → smoke → e2e and write evidence
    json: true
    source: .harness/contract.yml
    steps:
      - name: lint
        command: "npm run lint"
      - name: format_check
        command: "npm run format:check"
      - name: build
        command: "npm run build"
      - name: test
        command: "npm run test"
      - name: smoke
        command: "shared smoke implementation (auto loopback port)"
      - name: e2e
        command: "shared E2E implementation (auto loopback web/terminal ports)"
    evidence_dir: .harness/evidence/
    step_timeout_seconds: 300
    smoke:
      shared_implementation: true
      sequence_position: after test
      continue_on_failure: true
      evidence_metadata:
        allowed: [portMode, selectedPort, httpStatus, timeoutSeconds, pollIntervalMs]
        excluded_from_verify_evidence:
          [
            bindHost,
            probeHost,
            autoRange,
            maxCandidateAttempts,
            candidateAttempts,
            readinessAttempts,
            acceptedStatus,
            durationMs,
            cleanup,
            reason,
          ]
    e2e:
      shared_implementation: true
      sequence_position: after smoke
      continue_on_failure: true
      evidence_metadata:
        shape: "step metadata contains metadata.e2e as the canonical sanitized E2E object"
        test_counts:
          path: "metadata.e2e.testCounts"
          fields: [passed, failed, skipped, timedOut, interrupted]
        allowed:
          [
            e2e,
            targeted,
            targets,
            targetCount,
            truncated,
            playwrightProjects,
            testCounts,
            webPort,
            terminalPort,
            fixtureRunId,
            durationMs,
            artifactPaths,
          ]
        forbidden:
          [
            raw stdout/stderr,
            tokens,
            cookies,
            query strings,
            environment variables,
            response bodies,
            browser console logs,
            screenshots/traces/videos inline,
            external absolute paths,
          ]

  - name: smoke
    command: "npm run start -- --hostname 127.0.0.1 --port <selectedPort>"
    description: Start the existing production build on loopback and probe HTTP readiness
    json: true
    source: package.json start script
    usage: "./harness smoke [--port auto|PORT] [--json]"
    build_behavior: "does not run build; missing production build is fail"
    bind_host: "127.0.0.1"
    probe:
      url: "http://127.0.0.1:<port>/"
      follow_redirects: false
      interval_seconds: 1
      max_attempts: 60
      accepted_statuses: [200, 301, 302, 303, 307, 308]
    port_modes:
      default: auto
      auto:
        range: "41000-41999"
        max_candidates: 50
        exhausted_verdict: degraded
      fixed:
        accepted_values: "1-65535"
        conflict_verdict: degraded
    verdict_mapping:
      pass: "accepted HTTP status"
      fail: "missing build, start failure, readiness timeout, or HTTP 4xx/5xx"
      degraded: "fixed-port conflict or bounded auto-port exhaustion/race"
      unknown: "missing npm/start command or probe capability"
    cleanup:
      traps: [EXIT, INT, TERM]
      ownership: "kills only harness-owned child/process group"
      forbidden: "port-based killing"
    runtime_metadata:
      directory: .harness/run/
      lock_strategy: "atomic checkout/worktree-scoped smoke-<repo-hash>-<port>.lock directories"
      owner_file: owner.json
      scope: "repo realpath/safe identity plus selected port"
      records:
        [
          selected port,
          parent harness pid,
          child pid,
          process group id,
          safe repo identity,
          sanitized command summary,
          timestamp,
        ]
      stale_handling:
        process_gone: "remove stale metadata safely"
        proven_owned_live_process: "terminate only when repo/worktree identity and command summary match"
        unproven_live_process: "do not kill; treat candidate as unavailable"
      auto_port_race_safety: "lock candidate before post-lock availability check; release and retry on races/EADDRINUSE"
    metadata_policy:
      allowed:
        [
          port mode,
          selected port,
          bind/probe host,
          candidate attempts,
          readiness attempts,
          accepted status,
          duration,
          cleanup outcome,
          bounded reason code,
        ]
      forbidden:
        [
          raw stdout/stderr,
          response bodies,
          redirect locations,
          tokens,
          cookies,
          query strings,
          environment variables,
          credential URLs,
          external absolute paths,
        ]

  - name: status
    command: null
    description: Report harness configuration and recent evidence
    json: true
    source: built-in

  - name: clean
    command: "rm -rf .next node_modules"
    description: Remove build artifacts and node_modules
    json: true
    source: justfile clean recipe
    safety:
      confirmation: true
      skip_flag: "--yes"
      repo_root_guard: true

  - name: friction add
    command: null
    description: Append a friction record to .harness/friction.jsonl
    json: true
    source: built-in

  - name: friction list
    command: null
    description: Show recorded friction entries
    json: true
    source: built-in

detection:
  surfaces:
    - file: package.json
      detected: true
      scripts:
        [
          dev,
          build,
          analyze,
          start,
          terminal,
          "dev:all",
          lint,
          format,
          "format:check",
          test,
          e2e,
          "test:watch",
          "test:coverage",
        ]

    - file: justfile
      detected: true
      recipes:
        [
          dev,
          dev-next,
          dev-terminal,
          build,
          start,
          test,
          test-watch,
          test-coverage,
          lint,
          format,
          format-check,
          check,
          install,
          clean,
          reinstall,
          info,
        ]

    - file: .harness/contract.yml
      detected: true
      verify_steps: [lint, format_check, build, test, smoke, e2e]

    - file: .devcontainer/devcontainer.json
      detected: true
      features: [node, just, tmux, github-cli, copilot-cli]

    - pattern: ".github/workflows/*.yml"
      detected: true
      files: [ci.yml]

ci:
  workflow: .github/workflows/ci.yml
  source_of_truth: "./harness verify"
  job_timeout_minutes: 60
  setup_sequence:
    - name: npm ci
      timeout_minutes: null
    - name: Install Playwright Chromium
      command: "npx playwright install --with-deps chromium"
      timeout_minutes: 10
      env:
        DEBIAN_FRONTEND: noninteractive
    - name: ./harness verify
      timeout_minutes: 45
  browser_setup:
    bounded: true
    chromium_install_command: "npx playwright install --with-deps chromium"
    noninteractive_env: "DEBIAN_FRONTEND=noninteractive"

evidence:
  directory: .harness/evidence/
  format: JSON
  naming: "verify-{ISO-timestamp}-{PID}.json"
  retention: local-only (gitignored)
  content_policy:
    allowed:
      [
        command name,
        exit code,
        duration,
        verdict,
        timestamp,
        sanitized summary,
        sanitized smoke/test/E2E metadata,
      ]
    forbidden:
      [
        raw stdout/stderr,
        secrets,
        tokens,
        env vars,
        query strings,
        response bodies,
        redirect locations,
        absolute home paths,
        credential URLs,
        external absolute paths,
      ]

runtime:
  directory: .harness/run/
  retention: local-only (gitignored)
  content_policy:
    allowed:
      [
        secret-free smoke/E2E ownership metadata,
        E2E scratch fixture data,
        runtime scratch data,
        and test fixture metadata,
      ]
    forbidden: [secrets, tokens, raw logs, credential URLs]

friction:
  path: .harness/friction.jsonl
  format: JSONL
  key_question: "What did the agent have to infer that the harness should have proved?"
